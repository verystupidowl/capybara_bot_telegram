server:
  port: 8080
spring:
  liquibase:
    enabled: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
#          ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  messages:
    basename: i18n/common,i18n/fight/messages,i18n/shop/messages
    encoding: UTF-8
    fallback-to-system-locale: false

bot:
  token: ${BOT_TOKEN}
  webhook_url: ${WEBHOOK_URL}
  admin-id: ${ADMIN_ID}